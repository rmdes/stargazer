name: Update Stars

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Restore cached data
        uses: actions/cache@v4
        with:
          path: |
            data/stars.json
            data/classifications.json
          key: stargazer-data-${{ github.sha }}
          restore-keys: stargazer-data-

      - name: Fetch new stars
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: uv run stargazer fetch --delay 1.0

      - name: Classify new repos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run stargazer classify --batch-size 20 --delay 2.0

      - name: Generate README
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: uv run stargazer publish --skip-lists

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/taxonomy.json
          git diff --cached --quiet || git commit -m "chore: update stars $(date +%Y-%m-%d)"
          git push
